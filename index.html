<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Приватный чат</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="user-avatar" id="user-avatar" title="Настройки"></div>
        <div class="room-info">
          <div class="room-title" id="room-title">Приватный чат</div>
          <div class="room-status" id="room-status">Загрузка...</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="copy-link-btn" title="Копировать ссылку">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
        <button class="icon-btn" id="new-chat-btn" title="Новый чат">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>
    </header>

    <main id="messages">
      <div class="system">Загрузка истории...</div>
    </main>

    <footer id="chat-footer">
      <div class="input-wrapper" id="input-wrapper">
        <input type="text" id="msg-input" placeholder="Сообщение" autocomplete="off">
        <div class="input-actions">
          <button class="icon-btn" id="attach-btn" title="Прикрепить">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          </button>
          <button class="icon-btn" id="voice-btn" title="Зажмите для записи, нажмите для смены режима">
            <svg id="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 2.35-2.52 4.2-5.02 4.58V18h2.22v-2.46c2.01-.39 3.72-1.83 4.42-3.87l-1.62-.67z"/></svg>
            <svg id="cam-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l4.25 2.52"/></svg>
          </button>
          <button id="send-btn" style="display:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

      <div class="attach-menu" id="attach-menu">
        <div class="attach-menu-item" id="attach-photo">
          <svg viewBox="0 0 24 24" fill="#0088cc" width="20" height="20"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          Фото
        </div>
        <div class="attach-menu-item" id="attach-file">
          <svg viewBox="0 0 24 24" fill="#58a6ff" width="20" height="20"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          Файл
        </div>
      </div>
    </footer>
  </div>

  <!-- Recording Overlay -->
  <div class="recording-overlay" id="recording-overlay">
    <div class="recording-panel">
      <video id="rec-preview" class="rec-preview" autoplay playsinline muted style="display:none;"></video>
      <div class="rec-top">
        <div class="rec-timer" id="rec-timer">00:00</div>
        <canvas id="audio-canvas" width="300" height="40"></canvas>
      </div>
      <div class="rec-progress">
        <div class="rec-progress-fill" id="rec-progress-fill"></div>
      </div>
      <div class="rec-hint" id="rec-hint">Зажмите кнопку записи</div>
      <div class="rec-controls">
        <button class="rec-btn cancel" id="rec-cancel">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <button class="rec-btn flip" id="rec-flip">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-5 11.5V13H9v3.5L5.5 12 9 7.5V11h6V7.5L18.5 12l-3.5 4.5z"/></svg>
        </button>
        <button class="rec-btn send" id="rec-send">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Media Viewer -->
  <div class="media-viewer" id="media-viewer">
    <button class="viewer-close" id="viewer-close">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <div class="viewer-content" id="viewer-content"></div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <div class="ctx-item" data-action="reply">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Ответить
    </div>
    <div class="ctx-item" data-action="edit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      Редактировать
    </div>
    <div class="ctx-item delete" data-action="delete">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Удалить
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal glass">
      <h3>Настройки профиля</h3>
      <input type="text" class="modal-input" id="username-input" placeholder="Ваше имя" maxlength="30">
      <div class="modal-actions">
        <button class="modal-btn secondary" id="cancel-settings">Отмена</button>
        <button class="modal-btn primary" id="save-settings">Сохранить</button>
      </div>
    </div>
  </div>

  <input type="file" id="file-photo" accept="image/*" style="display: none;">
  <input type="file" id="file-general" style="display: none;">

  <script type="module" src="js/app.js"></script>
</body>
</html>
